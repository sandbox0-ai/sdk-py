                $ref: "#/components/schemas/SuccessFileListResponse"
  /api/v1/sandboxvolumes/{id}/snapshots:
    post:
      tags: [snapshots]
      summary: Create snapshot
      security:
        - bearerAuth: []
      x-upstream-service: storage-proxy
      x-upstream-path: /sandboxvolumes/{id}/snapshots
      parameters:
