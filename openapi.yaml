                  type: array
                  items:
                    $ref: "#/components/schemas/SandboxAppServiceView"
                exposure_domain:
                  type: string
              required: [sandbox_id, services]
    WebhookConfig:
      type: object
      description: |
        Per-sandbox webhook configuration. Sandbox0 delivers webhook events at least once and consumers should deduplicate by event_id. For sandbox lifecycle events, procd persists signed delivery records to a manager-owned SandboxVolume outside the workspace before dispatch; manager also emits sandbox.deleted during pod deletion cleanup.
      properties:
        url:
          description: Required when webhook is enabled. Target URL that receives event callbacks.
          type: string
        secret:
          description: Optional. Shared secret used to sign webhook payloads.
          type: string
        watch_dir:
          description: Optional. When set, procd subscribes to file events under this directory (same semantics as the file watch WebSocket API) and emits file.modified events.
          type: string
    ClaimResponse:
      type: object
