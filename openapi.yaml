  /api/v1/sandboxvolumes/{id}/snapshots/{snapshot_id}/restore:
    post:
      tags: [snapshots]
      summary: Restore snapshot
      security:
        - bearerAuth: []
      x-upstream-service: storage-proxy
      x-upstream-path: /sandboxvolumes/{id}/snapshots/{snapshot_id}/restore
      parameters:
        - $ref: "#/components/parameters/SandboxVolumeID"
        - $ref: "#/components/parameters/SnapshotID"
      responses:
        "200":
          description: Restored
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SuccessRestoreResponse"
components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
  parameters:
    SandboxID:
      name: id
      in: path
      required: true
      schema:
        type: string
    RootFSSnapshotID:
      name: snapshot_id
      in: path
      required: true
      schema:
        type: string
    ContextID:
      name: ctx_id
      in: path
      required: true
      schema:
        type: string
    ProcessID:
      name: process_id
      in: path
      required: true
      schema:
        type: string
    ProcessChannel:
      name: channel
      in: path
      required: true
      schema:
        type: string
    TemplateID:
      name: id
      in: path
      required: true
      schema:
        type: string
    TeamID:
      name: id
      in: path
      required: true
      schema:
        type: string
    RegionId:
      name: id
      in: path
      required: true
      schema:
        type: string
    UserID:
      name: userId
      in: path
      required: true
      schema:
        type: string
    APIKeyID:
      name: id
      in: path
      required: true
      schema:
        type: string
    IdentityID:
      name: id
      in: path
      required: true
      schema:
        type: string
    SandboxVolumeID:
      name: id
      in: path
      required: true
      schema:
        type: string
    SnapshotID:
      name: snapshot_id
      in: path
      required: true
      schema:
        type: string
    ReplicaID:
      name: replica_id
      in: path
      required: true
      schema:
        type: string
    ConflictID:
      name: conflict_id
      in: path
      required: true
      schema:
        type: string
    OIDCProvider:
      name: provider
      in: path
      required: true
      schema:
        type: string
    FilePath:
      name: path
      in: query
      required: true
      schema:
        type: string
    QueryMkdir:
      name: mkdir
      in: query
      required: false
      schema:
        type: boolean
    QueryRecursive:
      name: recursive
      in: query
      required: false
      schema:
        type: boolean
    QuotaDimension:
      name: dimension
      in: path
      required: true
      schema:
        $ref: "#/components/schemas/QuotaDimension"
  schemas:
    Error:
      type: object
      properties:
        code:
          type: string
        message:
          type: string
        details: {}
      required: [code, message]
    ErrorEnvelope:
      type: object
      properties:
        success:
          type: boolean
          enum: [false]
        error:
          $ref: "#/components/schemas/Error"
      required: [success, error]
    SuccessEnvelope:
      type: object
      properties:
        success:
          type: boolean
          enum: [true]
        data: {}
      required: [success]
    SuccessHealthResponse:
      allOf:
        - $ref: "#/components/schemas/SuccessEnvelope"
        - type: object
          properties:
            data:
              type: object
              properties:
                status:
                  type: string
                timestamp:
                  type: integer
                  format: int64
    GatewayMetadata:
      type: object
      properties:
        gateway_mode:
          type: string
          enum: [direct, global]
        service:
          type: string
      required: [gateway_mode, service]
    SuccessGatewayMetadataResponse:
      allOf:
        - $ref: "#/components/schemas/SuccessEnvelope"
        - type: object
          properties:
            data:
              $ref: "#/components/schemas/GatewayMetadata"
    SuccessMessageResponse:
      allOf:
        - $ref: "#/components/schemas/SuccessEnvelope"
        - type: object
          properties:
            data:
              type: object
              properties:
                message:
                  type: string
    SuccessTeamQuotaResponse:
      allOf:
        - $ref: "#/components/schemas/SuccessEnvelope"
        - type: object
          properties:
            data:
              $ref: "#/components/schemas/TeamQuota"
    QuotaDimension:
      type: string
      enum:
        - active_sandboxes
        - cpu_millicpu
        - memory_mib
        - volume_storage_gb
        - snapshot_storage_gb
        - egress
        - ingress
    TeamQuota:
      type: object
      properties:
        team_id:
          type: string
        dimension:
          $ref: "#/components/schemas/QuotaDimension"
        limit_value:
          type: integer
          format: int64
          nullable: true
        current:
          type: integer
          format: int64
          minimum: 0
        remaining:
          type: integer
          format: int64
          minimum: 0
          nullable: true
        unlimited:
          type: boolean
        unit:
          type: string
          enum:
            - count
            - millicpu
            - MiB
            - GB
            - bytes
      required: [team_id, dimension, limit_value, current, remaining, unlimited, unit]
    SuccessRegistryCredentialsResponse:
      allOf:
        - $ref: "#/components/schemas/SuccessEnvelope"
        - type: object
          properties:
            data:
              $ref: "#/components/schemas/RegistryCredentials"
    SuccessCredentialSourceResponse:
      allOf:
        - $ref: "#/components/schemas/SuccessEnvelope"
        - type: object
          properties:
            data:
              $ref: "#/components/schemas/CredentialSourceMetadata"
    SuccessCredentialSourceListResponse:
      allOf:
        - $ref: "#/components/schemas/SuccessEnvelope"
        - type: object
          properties:
            data:
              type: array
              items:
                $ref: "#/components/schemas/CredentialSourceMetadata"
    RegistryCredentials:
      type: object
      properties:
        provider:
          type: string
        pushRegistry:
          type: string
        pullRegistry:
          type: string
        username:
          type: string
        password:
          type: string
        expiresAt:
          type: string
          format: date-time
      required: [provider, pushRegistry, pullRegistry, username, password]
    RegistryCredentialsRequest:
      type: object
      properties:
        targetImage:
          type: string
          description: Target image name and tag requested for push, without credentials.
    SuccessDeletedResponse:
      allOf:
        - $ref: "#/components/schemas/SuccessEnvelope"
        - type: object
          properties:
            data:
              type: object
              properties:
                deleted:
                  type: boolean
    SuccessCreatedResponse:
      allOf:
        - $ref: "#/components/schemas/SuccessEnvelope"
        - type: object
          properties:
            data:
              type: object
              properties:
