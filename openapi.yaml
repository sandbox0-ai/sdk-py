    LabelSelector:
      type: object
      properties:
        matchLabels:
          type: object
          additionalProperties:
            type: string
        matchExpressions:
          type: array
          items:
            $ref: "#/components/schemas/LabelSelectorRequirement"
    LabelSelectorRequirement:
      type: object
