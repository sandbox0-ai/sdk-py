        key:
          type: string
        operator:
          type: string
        values:
          type: array
          items:
            type: string
      required: [key, operator]
    WeightedPodAffinityTerm:
      type: object
      properties:
        weight:
          type: integer
          format: int32
        podAffinityTerm:
          $ref: "#/components/schemas/PodAffinityTerm"
      required: [weight, podAffinityTerm]
    Toleration:
      type: object
      properties:
        key:
          type: string
        operator:
          type: string
        value:
          type: string
        effect:
          type: string
    PoolStrategy:
      type: object
      properties:
        minIdle:
          type: integer
          format: int32
        maxIdle:
          type: integer
          format: int32
      required: [minIdle, maxIdle]
    SandboxNetworkPolicy:
      type: object
      properties:
        mode:
          type: string
          enum: [allow-all, block-all]
        egress:
          $ref: "#/components/schemas/NetworkEgressPolicy"
        credentialBindings:
          type: array
          items:
            $ref: "#/components/schemas/CredentialBinding"
      required: [mode]
    NetworkEgressPolicy:
      type: object
      description: |
        Egress rule set interpreted by the selected network mode.
        In `allow-all`, only `denied*` fields are enforced.
        In `block-all`, only `allowed*` fields are enforced.
        `trafficRules` is a rule-based alternative and must not be combined
        with the legacy `allowed*`/`denied*` fields.
      properties:
        allowedCidrs:
          type: array
          deprecated: true
          description: Legacy CIDR allowlist used only when mode is `block-all`. Use `trafficRules` instead.
          items:
            type: string
        allowedDomains:
          type: array
          deprecated: true
          description: Legacy domain allowlist used only when mode is `block-all`. Use `trafficRules` instead.
          items:
            type: string
        allowedPorts:
          type: array
          deprecated: true
          description: Legacy port/protocol allowlist used only when mode is `block-all`. Use `trafficRules` instead.
          items:
            $ref: "#/components/schemas/PortSpec"
        deniedDomains:
          type: array
          deprecated: true
          description: Legacy domain denylist used only when mode is `allow-all`. Use `trafficRules` instead.
          items:
            type: string
        deniedCidrs:
          type: array
          deprecated: true
          description: Legacy CIDR denylist used only when mode is `allow-all`. Use `trafficRules` instead.
          items:
            type: string
        deniedPorts:
          type: array
          deprecated: true
          description: Legacy port/protocol denylist used only when mode is `allow-all`. Use `trafficRules` instead.
          items:
            $ref: "#/components/schemas/PortSpec"
        trafficRules:
          type: array
          description: |
            Ordered egress allow/deny rules. The first matching rule wins and
            unmatched traffic falls back to `mode`.
          items:
            $ref: "#/components/schemas/TrafficRule"
        protocolRules:
          type: array
          description: |
            Protocol-aware controls applied after traffic is allowed by
            `trafficRules` or legacy allow/deny fields.
          items:
            $ref: "#/components/schemas/ProtocolRule"
        credentialRules:
          type: array
          description: |
            Structured egress auth injection rules resolved by the manager runtime egress auth path.
            These rules are orthogonal to allow/deny matching and are intended for
            destination-scoped outbound auth behavior.
          items:
            $ref: "#/components/schemas/EgressCredentialRule"
        proxy:
          $ref: "#/components/schemas/EgressProxyPolicy"
    EgressProxyPolicy:
      type: object
      description: Customer-managed transparent egress proxy for allowed TCP traffic.
      properties:
        type:
          $ref: "#/components/schemas/EgressProxyType"
        address:
          type: string
          description: SOCKS5 proxy endpoint in host:port form.
          example: proxy.example.com:1080
        credentialRef:
          type: string
          description: Optional credential binding ref using a username_password projection.
      required: [type, address]
    EgressProxyType:
      type: string
      enum: [socks5]
      x-enum-varnames: [EgressProxyTypeSocks5]
    TrafficRule:
      type: object
      properties:
        name:
          type: string
          description: Optional stable identifier used for merge and replacement.
        action:
          $ref: "#/components/schemas/TrafficRuleAction"
        cidrs:
          type: array
          description: CIDR match list for the rule.
          items:
            type: string
        domains:
          type: array
          description: Domain match list for the rule.
          items:
            type: string
        ports:
          type: array
          description: Port/protocol constraints for the rule.
          items:
            $ref: "#/components/schemas/PortSpec"
        appProtocols:
          type: array
          description: Classified application protocols matched by the rule.
          items:
            $ref: "#/components/schemas/TrafficRuleAppProtocol"
      required: [action]
    TrafficRuleAction:
      type: string
      enum: [allow, deny]
    TrafficRuleAppProtocol:
      type: string
      enum: [http, tls, ssh, socks5, mqtt, redis, amqp, dns, mongodb, udp]
      x-enum-varnames:
        - TrafficRuleAppProtocolHttp
        - TrafficRuleAppProtocolTls
        - TrafficRuleAppProtocolSsh
        - TrafficRuleAppProtocolSocks5
        - TrafficRuleAppProtocolMqtt
        - TrafficRuleAppProtocolRedis
        - TrafficRuleAppProtocolAmqp
        - TrafficRuleAppProtocolDns
        - TrafficRuleAppProtocolMongodb
        - TrafficRuleAppProtocolUdp
    ProtocolRule:
      type: object
      description: Protocol-aware egress controls applied after destination traffic is allowed.
      properties:
        name:
          type: string
          description: Optional stable identifier used for merge and replacement.
        protocol:
          $ref: "#/components/schemas/ProtocolRuleProtocol"
        domains:
          type: array
          description: Domain match list for the rule.
          items:
            type: string
        ports:
          type: array
          description: Port/protocol constraints for the rule.
          items:
            $ref: "#/components/schemas/PortSpec"
        tlsMode:
          $ref: "#/components/schemas/EgressTLSMode"
        httpMatch:
          $ref: "#/components/schemas/HTTPMatch"
        http:
          $ref: "#/components/schemas/HTTPProtocolRule"
        mcp:
          $ref: "#/components/schemas/MCPProtocolRule"
      required: [protocol]
    ProtocolRuleProtocol:
      type: string
      enum: [http, mcp]
      x-enum-varnames:
        - ProtocolRuleProtocolHttp
        - ProtocolRuleProtocolMcp
    HTTPProtocolRule:
      type: object
      description: HTTP request operation policy.
      properties:
        methods:
          $ref: "#/components/schemas/HTTPMethodPolicy"
        paths:
          $ref: "#/components/schemas/HTTPPathPolicy"
    HTTPMethodPolicy:
      type: object
      description: HTTP method allow and deny lists.
      properties:
        allowed:
          type: array
          description: When non-empty, only listed HTTP methods are allowed.
          items:
            type: string
        denied:
          type: array
          description: HTTP methods that are always denied before allowed is evaluated.
          items:
            type: string
    HTTPPathPolicy:
      type: object
      description: HTTP path allow and deny lists.
      properties:
        allowed:
          type: array
          description: When any allowed path list is non-empty, only listed exact paths are allowed.
          items:
            type: string
        denied:
          type: array
          description: Exact paths that are always denied before allowed is evaluated.
          items:
            type: string
        allowedPrefixes:
          type: array
          description: When any allowed path list is non-empty, only paths with listed prefixes are allowed.
          items:
            type: string
        deniedPrefixes:
          type: array
          description: Path prefixes that are always denied before allowed is evaluated.
          items:
            type: string
    MCPProtocolRule:
      type: object
      description: Model Context Protocol operation policy.
      properties:
        tools:
          $ref: "#/components/schemas/MCPToolPolicy"
    MCPToolPolicy:
      type: object
      description: Tool-name allow and deny lists for MCP tools/call requests.
      properties:
        allowed:
          type: array
          description: When non-empty, only listed tool names are allowed.
          items:
            type: string
        denied:
          type: array
          description: Tool names denied before the allowed list is evaluated.
          items:
            type: string
    EgressCredentialRule:
      type: object
      properties:
        name:
          type: string
          description: Optional stable identifier used for merge and replacement.
        credentialRef:
          type: string
          description: |
            Stable binding ref to resolve when this traffic rule matches.
            The referenced binding must be present in `network.credentialBindings`.
        rollout:
          $ref: "#/components/schemas/EgressAuthRolloutMode"
        protocol:
          $ref: "#/components/schemas/EgressAuthProtocol"
        tlsMode:
          $ref: "#/components/schemas/EgressTLSMode"
        failurePolicy:
          $ref: "#/components/schemas/EgressAuthFailurePolicy"
        domains:
          type: array
          description: Domain match list for the rule.
          items:
            type: string
        ports:
          type: array
          description: Port/protocol constraints for the rule.
          items:
            $ref: "#/components/schemas/PortSpec"
        httpMatch:
          $ref: "#/components/schemas/HTTPMatch"
      required: [credentialRef]
    HTTPMatch:
      type: object
      description: Request-level matcher for HTTP-family egress credential rules.
      properties:
        methods:
          type: array
          description: HTTP methods matched case-insensitively after uppercasing.
          items:
            type: string
        paths:
          type: array
          description: Exact URL path matches.
          items:
            type: string
        pathPrefixes:
          type: array
          description: URL path prefix matches.
          items:
            type: string
        query:
          type: array
          description: Decoded query parameter matchers.
          items:
            $ref: "#/components/schemas/HTTPValueMatch"
        headers:
          type: array
          description: HTTP request header matchers.
          items:
            $ref: "#/components/schemas/HTTPValueMatch"
    HTTPValueMatch:
      type: object
      properties:
        name:
          type: string
          description: Header or query parameter name.
        values:
          type: array
          description: Accepted values. Empty with present=true requires only presence.
          items:
            type: string
        present:
          type: boolean
          description: When true and values is empty, only parameter/header presence is required.
      required: [name]
    CredentialBinding:
      type: object
      properties:
        ref:
          type: string
          description: Stable binding identifier matched by `credentialRef`.
        sourceRef:
          type: string
          description: Region-scoped credential source reference resolved by `manager`.
        projection:
          $ref: "#/components/schemas/ProjectionSpec"
        cachePolicy:
          $ref: "#/components/schemas/CachePolicySpec"
      required: [ref, sourceRef, projection]
    ProjectionSpec:
      type: object
      properties:
        type:
          $ref: "#/components/schemas/CredentialProjectionType"
        httpHeaders:
          $ref: "#/components/schemas/HTTPHeadersProjection"
        placeholderSubstitution:
          $ref: "#/components/schemas/PlaceholderSubstitutionProjection"
        tlsClientCertificate:
          $ref: "#/components/schemas/TLSClientCertificateProjection"
        usernamePassword:
          $ref: "#/components/schemas/UsernamePasswordProjection"
        sshProxy:
          $ref: "#/components/schemas/SSHProxyProjection"
      required: [type]
    CredentialProjectionType:
      type: string
      enum: [http_headers, placeholder_substitution, tls_client_certificate, username_password, ssh_proxy]
    HTTPHeadersProjection:
      type: object
      properties:
        headers:
          type: array
          description: Outbound headers synthesized from the resolved credential source.
          items:
            $ref: "#/components/schemas/ProjectedHeader"
    PlaceholderSubstitutionProjection:
      type: object
      properties:
        replacements:
          type: array
          description: Placeholder replacements applied to outbound HTTP requests at the egress boundary.
          items:
            $ref: "#/components/schemas/PlaceholderReplacement"
    PlaceholderReplacement:
      type: object
      properties:
        placeholder:
          type: string
          description: Opaque sandbox-visible value to replace.
        valueTemplate:
          type: string
          description: Template rendered against the resolved credential source payload.
        locations:
          type: array
          description: HTTP request locations where this placeholder can be replaced.
          items:
            $ref: "#/components/schemas/PlaceholderSubstitutionLocation"
      required: [placeholder, valueTemplate, locations]
    PlaceholderSubstitutionLocation:
      type: string
      enum: [header, query, body]
    TLSClientCertificateProjection:
      type: object
      description: Client certificate projection used for TLS terminate-reoriginate auth.
    UsernamePasswordProjection:
      type: object
      description: Username/password projection used for SOCKS5 and MQTT auth handshakes.
    SSHProxyProjection:
      type: object
      description: Transparent SSH proxy projection used for SSH egress re-origination.
      properties:
        sandboxPublicKeys:
          type: array
          description: Fake public keys accepted from sandbox-side SSH clients.
          items:
            type: string
        upstreamUsername:
          type: string
          description: Username used by netd when authenticating to the upstream SSH server.
        knownHosts:
          type: array
          description: OpenSSH known_hosts entries used to verify upstream host keys.
          items:
            type: string
    ProjectedHeader:
      type: object
      properties:
        name:
          type: string
          description: Outbound header name.
        valueTemplate:
          type: string
          description: Template rendered against the resolved credential source payload.
      required: [name, valueTemplate]
    CachePolicySpec:
      type: object
      properties:
        ttl:
          type: string
          description: Override for the broker-side cache TTL of resolved auth material.
    CredentialSourceMetadata:
      type: object
      properties:
        name:
          type: string
        resolverKind:
          $ref: "#/components/schemas/CredentialSourceResolverKind"
        currentVersion:
          type: integer
          format: int64
        status:
          type: string
        createdAt:
          type: string
          format: date-time
          nullable: true
        updatedAt:
          type: string
          format: date-time
          nullable: true
      required: [name, resolverKind]
    CredentialSourceWriteRequest:
      type: object
      properties:
        name:
          type: string
        resolverKind:
          $ref: "#/components/schemas/CredentialSourceResolverKind"
        spec:
          $ref: "#/components/schemas/CredentialSourceWriteSpec"
      required: [name, resolverKind, spec]
    CredentialSourceResolverKind:
      type: string
      enum: [static_headers, static_tls_client_certificate, static_username_password, static_ssh_private_key]
    CredentialSourceWriteSpec:
      type: object
      properties:
        staticHeaders:
          $ref: "#/components/schemas/StaticHeadersSourceSpec"
        staticTLSClientCertificate:
          $ref: "#/components/schemas/StaticTLSClientCertificateSourceSpec"
        staticUsernamePassword:
          $ref: "#/components/schemas/StaticUsernamePasswordSourceSpec"
        staticSSHPrivateKey:
          $ref: "#/components/schemas/StaticSSHPrivateKeySourceSpec"
    StaticHeadersSourceSpec:
      type: object
      properties:
        values:
          type: object
          writeOnly: true
          additionalProperties:
            type: string
    StaticTLSClientCertificateSourceSpec:
      type: object
      properties:
        certificatePem:
          type: string
          writeOnly: true
        privateKeyPem:
          type: string
          writeOnly: true
        caPem:
          type: string
          writeOnly: true
      required: [certificatePem, privateKeyPem]
    StaticUsernamePasswordSourceSpec:
      type: object
      properties:
        username:
          type: string
          writeOnly: true
        password:
          type: string
          writeOnly: true
      required: [username, password]
    StaticSSHPrivateKeySourceSpec:
      type: object
      properties:
        privateKeyPem:
          type: string
          writeOnly: true
        passphrase:
          type: string
          writeOnly: true
      required: [privateKeyPem]
    EgressAuthProtocol:
      type: string
      enum: [http, https, grpc, tls, ssh, socks5, mqtt, redis]
      x-enum-varnames:
        - EgressAuthProtocolHttp
        - EgressAuthProtocolHttps
        - EgressAuthProtocolGrpc
        - EgressAuthProtocolTls
        - EgressAuthProtocolSsh
        - EgressAuthProtocolSocks5
        - EgressAuthProtocolMqtt
        - EgressAuthProtocolRedis
    EgressAuthRolloutMode:
      type: string
      enum: [enabled, disabled]
      x-enum-varnames:
        - EgressAuthRolloutModeEnabled
        - EgressAuthRolloutModeDisabled
    EgressTLSMode:
      type: string
      enum: [passthrough, terminate-reoriginate]
    EgressAuthFailurePolicy:
      type: string
      enum: [fail-closed, fail-open]
    PortSpec:
      type: object
      properties:
        port:
          type: integer
          format: int32
        protocol:
          type: string
        endPort:
          type: integer
          format: int32
      required: [port]
    SandboxTemplateStatus:
      type: object
      properties:
        idleCount:
          type: integer
          format: int32
        activeCount:
          type: integer
          format: int32
        conditions:
          type: array
          items:
            $ref: "#/components/schemas/SandboxTemplateCondition"
        lastUpdateTime:
          type: string
          format: date-time
          nullable: true
    SandboxTemplateCondition:
      type: object
      properties:
        type:
          type: string
        status:
          type: string
        lastTransitionTime:
          type: string
          format: date-time
        reason:
          type: string
        message:
          type: string
    SuccessSandboxNetworkPolicyResponse:
      allOf:
        - $ref: "#/components/schemas/SuccessEnvelope"
        - type: object
          properties:
            data:
              $ref: "#/components/schemas/SandboxNetworkPolicy"
