          items:
            $ref: "#/components/schemas/HTTPHeader"
      required: [port]
    TCPSocketAction:
      type: object
      properties:
        port:
          $ref: "#/components/schemas/ProbePort"
        host:
          type: string
      required: [port]
    GRPCAction:
      type: object
      properties:
        port:
          type: integer
          format: int32
        service:
          type: string
      required: [port]
    HTTPHeader:
      type: object
      properties:
        name:
          type: string
        value:
          type: string
      required: [name, value]
    ProbePort:
      type: integer
      format: int32
    PodSpecOverride:
      type: object
      properties:
        nodeSelector:
          type: object
          additionalProperties:
            type: string
        affinity:
          $ref: "#/components/schemas/Affinity"
        tolerations:
          type: array
          items:
            $ref: "#/components/schemas/Toleration"
        serviceAccountName:
          type: string
        emptyDirMounts:
          type: array
          items:
            $ref: "#/components/schemas/EmptyDirMountSpec"
    EmptyDirMountSpec:
      type: object
      properties:
        mountPath:
          type: string
        sizeLimit:
          type: string
          description: Optional size limit for the Kubernetes emptyDir volume.
      required: [mountPath]
    Affinity:
      type: object
      properties:
        nodeAffinity:
          $ref: "#/components/schemas/NodeAffinity"
        podAffinity:
          $ref: "#/components/schemas/PodAffinity"
    NodeAffinity:
