  /api/v1/sandboxes/{id}/observability/events:
    get:
      tags: [observability]
      summary: Query canonical signed sandbox observability events
      description: |
        Queries canonical signed per-sandbox audit facts from ClickHouse. Every returned
        event includes an inline signature verification status, while event-ID payload
        conflicts are reported independently. Access requires the enterprise sandbox_audit
        feature and the sandboxaudit:read permission.
      x-enterprise-feature: sandbox_audit
      x-required-permission: sandboxaudit:read
      security:
        - bearerAuth: []
      x-upstream-service: cluster-gateway
      parameters:
        - $ref: "#/components/parameters/SandboxID"
        - name: start_time
          in: query
          description: Include events that occurred at or after this RFC3339 timestamp.
          schema:
            type: string
            format: date-time
        - name: end_time
          in: query
          description: Include events that occurred at or before this RFC3339 timestamp.
          schema:
            type: string
            format: date-time
        - name: limit
          in: query
          description: Maximum number of events to return. Values above 1000 are capped. Exact event_id mode ignores this value and returns at most two payload variants.
          schema:
            type: integer
            default: 100
            minimum: 1
            maximum: 1000
        - name: cursor
          in: query
          description: Opaque pagination cursor returned by a previous response. When watch is true, this must be a watch resume cursor from an NDJSON watermark line.
          schema:
            type: string
        - name: watch
          in: query
          description: Stream matching records as application/x-ndjson in ingestion order until the client disconnects. When watch is true, end_time is not supported. Without cursor or start_time, streaming starts at request time.
          schema:
            type: boolean
            default: false
        - name: max_schema_version
          in: query
          description: |
            Highest audit-event schema the client can decode. The default is 2
            so clients generated before execution-scope support never receive
            schema v3. Values newer than this server supports are capped to its
            current schema. Omitting this parameter while using any
            execution_scope filter implicitly negotiates schema v3; explicitly
            requesting schema v2 with such a filter is invalid.
          schema:
            type: integer
            minimum: 2
            default: 2
        - name: source
          in: query
          schema:
            $ref: "#/components/schemas/ObservabilityEventSource"
        - name: event_type
          in: query
          schema:
            $ref: "#/components/schemas/SandboxObservabilityEventType"
        - name: outcome
          in: query
          schema:
            $ref: "#/components/schemas/SandboxObservabilityOutcome"
        - name: actor_kind
          in: query
          schema:
            $ref: "#/components/schemas/SandboxAuditActorKind"
        - name: actor_id
          in: query
          schema:
            type: string
        - name: execution_scope_namespace
          in: query
          description: Restrict results to an exact execution-scope namespace such as codex.
          schema:
            type: string
            minLength: 1
            maxLength: 64
        - name: execution_scope_kind
          in: query
          description: Restrict results to an exact execution-scope kind such as native_session.
          schema:
            type: string
            minLength: 1
            maxLength: 64
        - name: execution_scope_id
          in: query
          description: Restrict results to an exact native execution-scope identifier.
          schema:
            type: string
            minLength: 1
            maxLength: 256
        - name: execution_scope_attribution
          in: query
          description: Restrict results to the runtime signal used to attribute the execution scope.
          schema:
            $ref: "#/components/schemas/SandboxAuditExecutionScopeAttribution"
        - name: action
          in: query
          schema:
            type: string
        - name: resource_type
          in: query
          schema:
            type: string
        - name: operation_id
          in: query
          schema:
            type: string
        - name: event_id
          in: query
          description: Exact lookup mode for one stable audit event ID. It cannot be combined with time, cursor, watch, or other event filters and returns one canonical row or two conflicting payload variants.
          schema:
            type: string
            format: uuid
      responses:
        "200":
          description: Canonical signed sandbox observability events
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SuccessSandboxObservabilityEventsResponse"
            application/x-ndjson:
              schema:
                $ref: "#/components/schemas/SandboxObservabilityWatchLine"
        "400":
          description: Invalid query parameters
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorEnvelope"
        "403":
          description: Forbidden or sandbox_audit is not licensed
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorEnvelope"
        "503":
          description: Sandbox observability backend disabled or unavailable
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorEnvelope"
