  /api/v1/sandboxes/{id}/observability/events:
    get:
      tags: [observability]
      summary: Query historical sandbox observability events
      description: |
        Queries the asynchronous per-sandbox observability projection for lifecycle,
        network audit, and runtime stats events. This endpoint does not expose backend SQL
        and reads tables that are separate from the metering usage ledger.
      security:
        - bearerAuth: []
      x-upstream-service: cluster-gateway
      parameters:
        - $ref: "#/components/parameters/SandboxID"
        - name: start_time
          in: query
          description: Include events that occurred at or after this RFC3339 timestamp.
          schema:
            type: string
            format: date-time
        - name: end_time
          in: query
          description: Include events that occurred at or before this RFC3339 timestamp.
          schema:
            type: string
            format: date-time
        - name: limit
          in: query
          description: Maximum number of events to return. Values above 1000 are capped.
          schema:
            type: integer
            default: 100
            minimum: 1
            maximum: 1000
        - name: cursor
          in: query
          description: Opaque pagination cursor returned by a previous response. When watch is true, this must be a watch resume cursor from an NDJSON watermark line.
          schema:
            type: string
        - name: watch
          in: query
          description: Stream matching records as application/x-ndjson in ingestion order until the client disconnects. When watch is true, end_time is not supported. Without cursor or start_time, streaming starts at request time.
          schema:
            type: boolean
            default: false
        - name: source
          in: query
          schema:
            $ref: "#/components/schemas/ObservabilityEventSource"
        - name: event_type
          in: query
          schema:
            $ref: "#/components/schemas/SandboxObservabilityEventType"
        - name: outcome
          in: query
          schema:
            $ref: "#/components/schemas/SandboxObservabilityOutcome"
      responses:
        "200":
          description: Historical sandbox observability events
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SuccessSandboxObservabilityEventsResponse"
            application/x-ndjson:
              schema:
                $ref: "#/components/schemas/SandboxObservabilityWatchLine"
        "400":
          description: Invalid query parameters
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorEnvelope"
        "403":
          description: Forbidden
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorEnvelope"
        "503":
          description: Historical observability backend disabled or unavailable
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorEnvelope"
