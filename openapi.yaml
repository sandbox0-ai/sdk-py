    ClaimRequest:
      type: object
      properties:
        template:
          type: string
        snapshot_id:
          type: string
          description: Optional sandbox rootfs snapshot ID used to initialize the claimed sandbox writable root filesystem.
        config:
          $ref: "#/components/schemas/SandboxConfig"
        mounts:
          type: array
          description: Optional claim-time Sandbox Volume bindings. A claim may bind any subset of template-declared mount points; omitted declared mount points remain writable rootfs-backed directories and are included in rootfs checkpoints.
          items:
            $ref: "#/components/schemas/ClaimMountRequest"
      required: []
    ClaimMountRequest:
      type: object
      properties:
        sandboxvolume_id:
          type: string
        mount_point:
          type: string
      required: [sandboxvolume_id, mount_point]
    SandboxConfig:
      type: object
      properties:
        env_vars:
          type: object
          additionalProperties:
            type: string
        resources:
          $ref: "#/components/schemas/SandboxResourceConfig"
        ttl:
          type: integer
          format: int32
          description: Runtime soft time-to-live in seconds. When it expires, Sandbox0 checkpoints the writable rootfs, pauses the sandbox, and releases runtime compute while preserving durable sandbox state.
        hard_ttl:
          type: integer
          format: int32
          description: Sandbox hard time-to-live in seconds. When it expires, Sandbox0 deletes the sandbox identity and durable state, including paused rootfs checkpoints.
        network:
          $ref: "#/components/schemas/SandboxNetworkPolicy"
        webhook:
          $ref: "#/components/schemas/WebhookConfig"
        auto_resume:
          type: boolean
          default: true
          description: |
            Sandbox-level resume gate for paused sandboxes. When false, any inbound request
            (API or public exposure) must not auto resume the sandbox.
        services:
          type: array
          items:
            $ref: "#/components/schemas/SandboxAppService"
    SandboxResourceConfig:
      type: object
      description: Instance-level sandbox resource override. Sandbox0 exposes memory only and derives CPU from the platform memory-per-CPU ratio.
      properties:
        memory:
          type: string
          description: Sandbox memory limit. Must be at least 128Mi and no more than the platform sandbox maximum, which defaults to 32Gi.
    SandboxAppServiceRouteAuth:
      type: object
      properties:
        mode:
          type: string
          enum: [none, bearer, header]
          default: none
        bearer_token_sha256:
          type: string
          description: Hex SHA-256 of the accepted bearer token. Required when mode is bearer.
        header_name:
          type: string
          description: Required header name when mode is header.
        header_value_sha256:
          type: string
          description: Hex SHA-256 of the required header value when mode is header.
      required: [mode]
    SandboxAppServiceRouteCORS:
      type: object
      properties:
        allowed_origins:
          type: array
          items:
            type: string
        allowed_methods:
          type: array
          items:
            type: string
        allowed_headers:
          type: array
          items:
            type: string
        expose_headers:
          type: array
          items:
            type: string
        allow_credentials:
          type: boolean
        max_age_seconds:
          type: integer
          format: int32
    SandboxAppServiceRouteRateLimit:
      type: object
      properties:
        rps:
          type: integer
          format: int32
        burst:
          type: integer
          format: int32
      required: [rps, burst]
    SandboxAppService:
      type: object
      description: Canonical service model for sandbox exposure.
      properties:
        id:
          type: string
          description: Stable service ID. Must be a DNS label.
        display_name:
          type: string
        port:
          type: integer
          format: int32
          description: Public exposure routing port. Required for manual and cmd services. Omit for function services; Sandbox0 assigns the internal function service port.
        runtime:
          $ref: "#/components/schemas/SandboxAppServiceRuntime"
        ingress:
          $ref: "#/components/schemas/SandboxAppServiceIngress"
        health_check:
          $ref: "#/components/schemas/SandboxAppServiceHealth"
      required: [id, ingress]
    SandboxAppServiceRuntime:
      type: object
      properties:
        type:
          type: string
          enum: [cmd, manual, function]
          description: Runtime strategy for restarting a service process.
        command:
          type: array
          items:
            type: string
          description: Process argv used when type is cmd.
        cwd:
          type: string
        env_vars:
          type: object
          additionalProperties:
            type: string
        function:
          $ref: "#/components/schemas/SandboxFunction"
      required: [type]
    SandboxFunction:
      type: object
      description: Function code executed by procd for a sandbox service request. cluster-gateway owns public ingress and carries this source to procd.
      properties:
        runtime:
          type: string
          enum: [python]
          description: Function runtime. Only python is supported in this version.
        handler:
          type: string
          description: Python callable name. Defaults to handler.
        max_concurrency:
          type: integer
          format: int32
          minimum: 0
          maximum: 1024
          description: Maximum in-flight executions for this function service inside one sandbox runtime. Omit or set to 0 for unlimited.
        source:
          $ref: "#/components/schemas/SandboxFunctionSource"
      required: [runtime, source]
    SandboxFunctionSource:
      type: object
      description: Function source code stored in sandbox service config.
      properties:
        type:
          type: string
          enum: [inline]
          description: Source transport. Only inline source is supported in this version.
        code:
          type: string
          description: Inline source code. Limited to 256 KiB.
      required: [type, code]
    SandboxAppServiceIngress:
      type: object
      properties:
        public:
          type: boolean
        routes:
          type: array
          items:
            $ref: "#/components/schemas/SandboxAppServiceRoute"
      required: [public]
    SandboxAppServiceRoute:
      type: object
      properties:
        id:
          type: string
        path_prefix:
          type: string
        methods:
          type: array
          items:
            type: string
        rewrite_prefix:
          type: string
          nullable: true
        auth:
          $ref: "#/components/schemas/SandboxAppServiceRouteAuth"
        cors:
          $ref: "#/components/schemas/SandboxAppServiceRouteCORS"
        rate_limit:
          $ref: "#/components/schemas/SandboxAppServiceRouteRateLimit"
        timeout_seconds:
          type: integer
          format: int32
        resume:
          type: boolean
          description: |
            Allows this public route to wake a paused sandbox when sandbox auto_resume is true.
            Resume-enabled public routes require a restartable service runtime: cmd or function.
      required: [id, resume]
    SandboxAppServiceHealth:
      type: object
      properties:
        path:
          type: string
    SandboxAppServiceView:
      allOf:
        - $ref: "#/components/schemas/SandboxAppService"
        - type: object
          properties:
            publishable:
              type: boolean
            publish_blockers:
              type: array
              items:
                type: string
            public_url:
              type: string
              description: Public HTTPS URL for this service when public exposure is enabled.
          required: [publishable]
