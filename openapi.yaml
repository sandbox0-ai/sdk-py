        "200":
          description: Moved
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SuccessMovedResponse"
  /api/v1/sandboxvolumes/{id}/files/watch:
    get:
      tags: [files]
      summary: Volume file watch WebSocket
      description: |
        Upgrades to WebSocket for volume file watch events.
        Client messages:
        - { "action": "subscribe", "path": "/tmp", "recursive": false }
        - { "action": "unsubscribe", "watch_id": "watch-id" }
        Server messages:
        - { "type": "subscribed", "watch_id": "watch-id", "path": "/tmp" }
        - { "type": "event", "watch_id": "watch-id", "event": "write", "path": "/tmp/a.txt" }
        - { "type": "unsubscribed", "watch_id": "watch-id" }
        - { "type": "error", "error": "message" }
      security:
        - bearerAuth: []
      x-upstream-service: storage-proxy
      x-upstream-path: /sandboxvolumes/{id}/files/watch
      x-websocket:
        inbound:
          $ref: "#/components/schemas/FileWatchRequest"
        outbound:
          $ref: "#/components/schemas/FileWatchResponse"
      parameters:
        - $ref: "#/components/parameters/SandboxVolumeID"
      responses:
        "101":
          description: Switching Protocols
  /api/v1/sandboxvolumes/{id}/files/archive:
    put:
      tags: [files]
      summary: Import a tar archive into a volume
      description: |
        Streams a tar archive into a volume path. The archive is extracted under the `path` query parameter.
        Regular files overwrite existing files. Directories are created as needed. The import is not atomic;
        deployment flows should import into a fresh volume when rollback is required.
      security:
        - bearerAuth: []
      x-upstream-service: storage-proxy
      x-upstream-path: /sandboxvolumes/{id}/files/archive
      parameters:
        - $ref: "#/components/parameters/SandboxVolumeID"
        - $ref: "#/components/parameters/FilePath"
      requestBody:
        required: true
        content:
          application/x-tar:
            schema:
              type: string
              format: binary
      responses:
        "200":
          description: Archive imported
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SuccessVolumeFileArchiveImportResponse"
  /api/v1/sandboxvolumes/{id}/files:
    get:
      tags: [files]
      summary: Read volume file content
      description: |
        Use query params:
        - path=/tmp/a.txt: target file path relative to the volume root
        When `Accept` or `Content-Type` is `application/json`, returns a base64 JSON payload.
      security:
        - bearerAuth: []
      x-upstream-service: storage-proxy
      x-upstream-path: /sandboxvolumes/{id}/files
      parameters:
        - $ref: "#/components/parameters/SandboxVolumeID"
        - $ref: "#/components/parameters/FilePath"
      responses:
        "200":
          description: File content
          content:
            application/octet-stream:
              schema:
                type: string
                format: binary
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/SuccessEnvelope"
                  - type: object
                    properties:
                      data:
                        $ref: "#/components/schemas/FileContentResponse"
    post:
      tags: [files]
      summary: Write volume file or create directory
      description: Use `path` query param and `mkdir=true` to create directories, otherwise writes file content.
      security:
        - bearerAuth: []
      x-upstream-service: storage-proxy
      x-upstream-path: /sandboxvolumes/{id}/files
      parameters:
        - $ref: "#/components/parameters/SandboxVolumeID"
        - $ref: "#/components/parameters/FilePath"
        - $ref: "#/components/parameters/QueryMkdir"
        - $ref: "#/components/parameters/QueryRecursive"
      requestBody:
        required: false
        content:
          application/octet-stream:
            schema:
              type: string
              format: binary
      responses:
        "200":
          description: File written
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SuccessWrittenResponse"
        "201":
          description: Directory created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SuccessCreatedResponse"
    delete:
      tags: [files]
      summary: Delete volume file or directory
      security:
        - bearerAuth: []
      x-upstream-service: storage-proxy
      x-upstream-path: /sandboxvolumes/{id}/files
      parameters:
        - $ref: "#/components/parameters/SandboxVolumeID"
        - $ref: "#/components/parameters/FilePath"
      responses:
        "200":
          description: Deleted
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SuccessDeletedResponse"
  /api/v1/sandboxvolumes/{id}/files/stat:
    get:
      tags: [files]
      summary: Stat a volume file
      description: |
        Use query params:
        - path=/tmp/a.txt: target file path relative to the volume root
      security:
        - bearerAuth: []
      x-upstream-service: storage-proxy
      x-upstream-path: /sandboxvolumes/{id}/files/stat
