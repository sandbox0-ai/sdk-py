    ContextWebSocketRequest:
      oneOf:
        - $ref: "#/components/schemas/ContextWebSocketInput"
        - $ref: "#/components/schemas/ContextWebSocketResize"
        - $ref: "#/components/schemas/ContextWebSocketSignal"
    ContextWebSocketInput:
      type: object
      properties:
        type:
          type: string
          enum: [input]
        data:
          type: string
          description: Input bytes encoded as a string. The WebSocket endpoint writes this value exactly as provided and does not append a newline.
        request_id:
          type: string
      required: [type]
    ContextWebSocketResize:
      type: object
      properties:
        type:
          type: string
          enum: [resize]
        rows:
          type: integer
          format: int32
        cols:
          type: integer
          format: int32
      required: [type, rows, cols]
    ContextWebSocketSignal:
      type: object
      properties:
        type:
          type: string
          enum: [signal]
        signal:
          type: string
      required: [type, signal]
    ContextWebSocketResponse:
      oneOf:
        - $ref: "#/components/schemas/ContextWebSocketOutput"
        - $ref: "#/components/schemas/ContextWebSocketDone"
    ContextWebSocketOutput:
      type: object
      properties:
        type:
          type: string
          enum: [output]
        source:
          type: string
          enum: [stdout, stderr, pty]
        data:
          type: string
      required: [type, source, data]
    ContextWebSocketDone:
      type: object
      properties:
        type:
          type: string
          enum: [done]
        request_id:
          type: string
          description: Present for request-scoped REPL completion events.
        exit_code:
          type: integer
          format: int32
          description: Present when the underlying process has exited.
        state:
          type: string
          description: Final process state when the underlying process has exited.
      required: [type]
    VolumeAccessMode:
      type: string
      enum: [RWO, ROX, RWX]
      description: >-
        Access mode for sandbox volumes. Enforcement is scoped to storage-proxy instances. RWO allows read-write mounts on a single instance; ROX allows read-only mounts across instances; RWX allows read-write mounts across instances.
    VolumeBackend:
      type: string
      enum: [s0fs, s3]
      description: >-
        Storage backend for a SandboxVolume. s0fs is the default durable Sandbox0 volume backend. s3 mounts an existing S3-compatible prefix through the volume portal and supports mount-s3-like object projection.
    CreateSandboxVolumeS3Config:
      type: object
      properties:
        provider:
          type: string
          enum: [aws, ali, r2]
          default: aws
          description: S3-compatible provider. ali is Aliyun OSS; r2 is Cloudflare R2.
        bucket:
          type: string
        prefix:
          type: string
          description: Optional object key prefix to expose as the volume root.
        region:
          type: string
          description: AWS region for the target bucket. Required for provider aws unless endpoint_url is provided.
        endpoint_url:
          type: string
          description: Optional endpoint override. Required for ali and r2. For aws, endpoint_url can be used instead of region for S3-compatible endpoints.
        access_key:
          type: string
          description: Access key for this S3 backend volume. Required with secret_key. Stored encrypted and omitted from API responses.
        secret_key:
          type: string
          description: Secret key for this S3 backend volume. Required with access_key. Stored encrypted and omitted from API responses.
        session_token:
          type: string
          description: Optional temporary credential session token.
      required: [bucket, access_key, secret_key]
    SandboxVolumeS3Config:
      type: object
      properties:
        provider:
          type: string
          enum: [aws, ali, r2]
        bucket:
          type: string
        prefix:
          type: string
        region:
          type: string
        endpoint_url:
          type: string
      required: [provider, bucket]
    MountStatus:
      type: object
      properties:
        sandboxvolume_id:
          type: string
        mount_point:
          type: string
        state:
          type: string
          enum: [pending, mounting, mounted, failed]
        mounted_at:
          type: string
        mounted_duration_sec:
          type: integer
          format: int64
        error_code:
          type: string
        error_message:
          type: string
      required: [sandboxvolume_id, mount_point, state]
    CreateSandboxVolumeRequest:
      type: object
      properties:
        snapshot_id:
          type: string
          description: Optional snapshot ID used to initialize the new volume from immutable snapshot state.
        backend:
          $ref: "#/components/schemas/VolumeBackend"
          description: Volume backend. Defaults to s0fs when omitted. If s3 is provided without backend, backend is inferred as s3.
        s3:
          $ref: "#/components/schemas/CreateSandboxVolumeS3Config"
          description: S3-compatible backend configuration. Only valid with backend s3; per-volume access_key and secret_key are required, stored encrypted, and omitted from API responses; s3 volumes do not support snapshot_id or RWX access mode.
        default_posix_uid:
          type: integer
          format: int64
          minimum: 0
          default: 0
          description: Default POSIX UID used by external volume access paths that do not carry caller identity. Defaults to 0 when omitted on create.
        default_posix_gid:
          type: integer
          format: int64
          minimum: 0
          default: 0
          description: Default POSIX GID used by external volume access paths that do not carry caller identity. Defaults to 0 when omitted on create.
        access_mode:
          $ref: "#/components/schemas/VolumeAccessMode"
          description: Access mode for the volume. Defaults to RWO when omitted.
    ForkVolumeRequest:
      type: object
      properties:
        default_posix_uid:
          type: integer
          format: int64
          minimum: 0
          description: Override the default POSIX UID for external volume access paths. Inherits from the source volume when omitted.
        default_posix_gid:
          type: integer
          format: int64
          minimum: 0
          description: Override the default POSIX GID for external volume access paths. Inherits from the source volume when omitted.
        access_mode:
          $ref: "#/components/schemas/VolumeAccessMode"
          description: Access mode for the volume. Defaults to RWO when omitted.
    SandboxVolume:
      type: object
      properties:
        id:
          type: string
        team_id:
          type: string
        user_id:
          type: string
        source_volume_id:
          type: string
          nullable: true
        default_posix_uid:
          type: integer
          format: int64
          minimum: 0
          nullable: true
        default_posix_gid:
          type: integer
          format: int64
          minimum: 0
          nullable: true
        access_mode:
          $ref: "#/components/schemas/VolumeAccessMode"
          description: Configured access mode for the volume.
        backend:
          $ref: "#/components/schemas/VolumeBackend"
          description: Configured storage backend for the volume.
        s3:
          $ref: "#/components/schemas/SandboxVolumeS3Config"
          description: Public S3-compatible backend metadata. Credentials are never returned.
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time
      required: [id, team_id, user_id, backend, created_at, updated_at]
