                $ref: "#/components/schemas/ErrorEnvelope"
        "409":
          description: Cursor conflict, expired replica lease, reseed required, or request id collision
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorEnvelope"
  /api/v1/sandboxvolumes/{id}/sync/replicas/{replica_id}/cursor:
    put:
      tags: [volume-sync]
      summary: Advance a volume sync replica cursor
      security:
        - bearerAuth: []
      x-upstream-service: storage-proxy
      x-upstream-path: /sandboxvolumes/{id}/sync/replicas/{replica_id}/cursor
      parameters:
        - $ref: "#/components/parameters/SandboxVolumeID"
        - $ref: "#/components/parameters/ReplicaID"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateSyncReplicaCursorRequest"
      responses:
        "200":
          description: Replica state
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SuccessVolumeSyncReplicaResponse"
        "409":
          description: Cursor conflict, expired replica lease, or reseed required
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorEnvelope"
