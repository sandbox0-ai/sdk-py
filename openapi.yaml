          $ref: "#/components/schemas/SandboxLifecycleStatus"
        pod_name:
          type: string
        template:
          type: string
        cluster_id:
          type: string
          nullable: true
        bootstrap_mounts:
          type: array
          items:
            $ref: "#/components/schemas/MountStatus"
      required: [sandbox_id, status, pod_name, template]
    SuccessClaimResponse:
      allOf:
        - $ref: "#/components/schemas/SuccessEnvelope"
        - type: object
          properties:
            data:
              $ref: "#/components/schemas/ClaimResponse"
    SandboxLifecycleStatus:
      type: string
      enum: [starting, running, paused, terminating, failed]
      x-enum-varnames:
        - SandboxLifecycleStatusStarting
        - SandboxLifecycleStatusRunning
        - SandboxLifecycleStatusPaused
        - SandboxLifecycleStatusTerminating
        - SandboxLifecycleStatusFailed
    Sandbox:
      type: object
      properties:
        id:
          type: string
        template_id:
          type: string
        team_id:
          type: string
        user_id:
          type: string
        status:
          $ref: "#/components/schemas/SandboxLifecycleStatus"
        paused:
          type: boolean
          description: True when status is paused.
        auto_resume:
          type: boolean
        services:
          type: array
          items:
            $ref: "#/components/schemas/SandboxAppService"
        resources:
          $ref: "#/components/schemas/SandboxResourceConfig"
        mounts:
          type: array
          items:
            $ref: "#/components/schemas/ClaimMountRequest"
        pod_name:
          type: string
        runtime_generation:
          type: integer
          format: int64
          description: Monotonically increasing runtime generation. Resume starts a new generation.
        ssh:
          $ref: "#/components/schemas/SandboxSSHConnection"
        expires_at:
          type: string
          format: date-time
          description: Soft expiration timestamp. Zero value means not set.
        hard_expires_at:
          type: string
          format: date-time
          description: Hard expiration timestamp. Zero value means not set.
        claimed_at:
          type: string
          format: date-time
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time
      required:
        - id
        - template_id
        - team_id
        - status
        - paused
        - auto_resume
        - pod_name
        - runtime_generation
        - expires_at
        - hard_expires_at
        - claimed_at
        - created_at
        - updated_at
    SandboxSSHConnection:
      type: object
      properties:
        host:
          type: string
        port:
          type: integer
        username:
          type: string
      required:
        - host
        - port
        - username
    SandboxUpdateConfig:
      type: object
      description: |
        Subset of SandboxConfig fields that can be updated at runtime without restarting the sandbox.
        Note: env_vars only affect new processes. webhook is not included as it requires restart.
      properties:
        env_vars:
          type: object
          additionalProperties:
            type: string
          description: |
            Sandbox-level environment variables used as defaults for new procd-managed
            processes. Omitting this field preserves the existing environment map; passing
            an empty object clears it.
        resources:
          $ref: "#/components/schemas/SandboxResourceConfig"
        ttl:
          type: integer
          format: int32
          description: Runtime soft time-to-live in seconds. When it expires, Sandbox0 checkpoints the writable rootfs, pauses the sandbox, and releases runtime compute while preserving durable sandbox state.
        hard_ttl:
          type: integer
          format: int32
          description: Sandbox hard time-to-live in seconds. When it expires, Sandbox0 deletes the sandbox identity and durable state, including paused rootfs checkpoints.
        network:
          $ref: "#/components/schemas/SandboxNetworkPolicy"
        auto_resume:
          type: boolean
          default: true
          description: |
            Sandbox-level resume gate for paused sandboxes. When false, any inbound request
            (API or public exposure) must not auto resume the sandbox.
        services:
          type: array
          items:
            $ref: "#/components/schemas/SandboxAppService"
