          type: string
          description: Input bytes encoded as a string. The WebSocket endpoint writes this value exactly as provided and does not append a newline.
        request_id:
          type: string
      required: [type]
    ContextWebSocketResize:
      type: object
      properties:
        type:
          type: string
          enum: [resize]
