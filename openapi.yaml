  /api/v1/sandboxes/{id}/metrics:
    get:
      operationId: getSandboxRuntimeMetrics
      tags: [observability]
      summary: Query chart-ready sandbox runtime metrics
      description: |
        Returns bounded, downsampled sandbox-wide runtime series. When timestamps are
        omitted, the query covers the hour ending now. The maximum range is 30 days.
        Counter rates never cross a runtime reset boundary. Missing data is reported
        as gaps and is never synthesized as zero. This endpoint is separate from
        platform service metrics and metering usage truth.
      security:
        - bearerAuth: []
      x-upstream-service: cluster-gateway
      parameters:
        - $ref: "#/components/parameters/SandboxID"
        - name: start_time
          in: query
          description: Query observations at or after this RFC3339 timestamp. Defaults to one hour before end_time.
          schema:
            type: string
            format: date-time
        - name: end_time
          in: query
          description: Query observations at or before this RFC3339 timestamp. Defaults to the current time.
          schema:
            type: string
            format: date-time
        - name: metrics
          in: query
          description: Comma-separated canonical metric names. Defaults to CPU utilization, memory utilization, and network I/O.
          schema:
            type: string
        - name: step_seconds
          in: query
          description: Requested bucket width in seconds. The effective step is at least 15 seconds and may be increased to honor max_points.
          schema:
            type: integer
            minimum: 1
            maximum: 86400
        - name: statistic
          in: query
          description: Aggregation applied within each output bucket. Auto uses average for gauges and rate for counters.
          schema:
            $ref: "#/components/schemas/SandboxRuntimeMetricStatistic"
        - name: max_points
          in: query
          description: Maximum points per returned series. The server may increase step_seconds to honor this bound.
          schema:
            type: integer
            default: 240
            minimum: 1
            maximum: 1000
      responses:
        "200":
          description: Chart-ready sandbox runtime metric series
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SuccessSandboxRuntimeMetricsResponse"
        "400":
          description: Invalid query parameters
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorEnvelope"
        "403":
          description: Forbidden
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorEnvelope"
        "503":
          description: Historical observability backend disabled or unavailable
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorEnvelope"
