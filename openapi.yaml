          format: int32
        timeoutSeconds:
          type: integer
          format: int32
        periodSeconds:
          type: integer
          format: int32
        successThreshold:
          type: integer
          format: int32
        failureThreshold:
          type: integer
          format: int32
        terminationGracePeriodSeconds:
          type: integer
          format: int64
    ExecAction:
      type: object
      properties:
        command:
          type: array
          items:
            type: string
    HTTPGetAction:
      type: object
      properties:
        path:
          type: string
